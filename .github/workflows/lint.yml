# Thin caller -> reusable lint in bendoerr-terraform-modules/workflows.
# lambda runs the full TF-module lint set, so all 4 gates default true and the knobs default to
# lambda's own values -> this caller needs no `with:` overrides (lambda IS the reusable's baseline).
# Caller perms = the union the reusable's jobs need (pull-requests: write for reviewdog, contents: read
# for mdformat/terraform-docs), capped here. Lint is NOT a required check (no required_status_checks),
# so the surfaced check rename is cosmetic. SHA-pinned (big-blast consolidation).
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    permissions:
      contents: read
      pull-requests: write
    uses: bendoerr-terraform-modules/workflows/.github/workflows/lint.yml@1c9572cfd56a2aa0b7bd89afe37545ea4c310e40
